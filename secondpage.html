<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Sunset</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', system-ui;
            color: white;
            overflow: hidden;
            height: 100vh;
            background: #000;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg1.jpg');
            background-size: cover;
            background-position: center;
            image-rendering: pixelated;
            z-index: -1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4));
            z-index: -1;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 4px solid #ff99cc;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        .nav-button {
            padding: 12px 28px;
            font-size: 18px;
            color: white;
            background: #4a2c6d;
            border: 4px solid #ff99cc;
            text-decoration: none;
            box-shadow: 4px 4px 0 #000;
            transition: all 0.2s;
        }

        .nav-button:hover {
            background: #ff99cc;
            color: #4a2c6d;
            transform: translateY(-4px);
        }

        .content {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 10;
            padding-top: 80px;
        }

        .title {
            font-size: 42px;
            text-shadow: 4px 4px 0 #000;
            color: #ffccdd;

            margin-top: -300px;
            display: inline-block;
            will-change: transform;
            animation: bounce-slow 4s ease-in-out infinite;


        }

        .subtitle {
            font-size: 18px;
            color: #ffe6f0;
            text-shadow: 2px 2px 0 #000;
            margin-top: -160px;
        }

        @keyframes bounce-slow {

            0%,
            100% {
                transform: translateY(-180px);
            }

            50% {
                transform: translateY(-165px);
            }
        }

        /* Music Control Button */
        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 18px;
            background: rgba(74, 44, 109, 0.9);
            border: 3px solid #ff99cc;
            color: white;
            font-family: 'Press Start 2P';
            font-size: 14px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 4px 4px 0 #000;
        }
    </style>
</head>



<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <header>
        <nav class="nav1">
            <a href="index.html" class="nav-button"><i>LOCK</i></a>
            <a href="3rd.html" class="nav-button"><i>ALBUM</i></a>
            <a href="letter.html" class="nav-button"><i>LETTER</i></a>
            <a href="Shoppingcart.html" class="nav-button"><i>SHOPPING</i></a>
        </nav>
    </header>

    <div class="content">
        <div>
            <h1 class="title">OUR MOMENT</h1>
            <p class="subtitle">Under the same sky, forever</p>
        </div>
    </div>

    <style>
        .nav1 {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="[No Copyright Music] Chill Lofi Hip Hop Beat FREE Instrumental (Copyright Free) Chillhop Music.mp3"
            type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <button class="music-btn" id="musicToggle">🔊 Music ON</button>

    <script>
        const audio = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('musicToggle');

        // Try to autoplay
        function playMusic() {
            audio.play().catch(() => {
                // Autoplay blocked - will wait for user interaction
                console.log("Autoplay prevented by browser");
            });
        }

        // Start music when page loads
        window.addEventListener('load', () => {
            playMusic();
        });

        // Toggle music on/off
        toggleBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                toggleBtn.textContent = "🔊 Music ON";
            } else {
                audio.pause();
                toggleBtn.textContent = "🔇 Music OFF";
            }
        });

        // Fallback: Play on first user click anywhere (helps bypass autoplay restrictions)
        document.addEventListener('click', () => {
            if (audio.paused) {
                playMusic();
            }
        }, { once: true });
    </script>
</body>

</html>
